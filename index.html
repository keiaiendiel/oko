// ─── geometry ──────────────────────────────
const LATS = [], LONS = [], IRIS_RINGS = [], IRIS_SPOKES = [];
const LAT_STEP = 15, LON_STEP = 20;

const SPOKE_COUNT = 14;
const PUPIL_ANGLE = 6;
const FOV = 3.5;

function buildGeometry() {
  for (let lat = -75; lat <= 75; lat += LAT_STEP) {
    const ring = [];
    const r = cos(radians(lat)), y = sin(radians(lat));
    for (let t = 0; t <= 360; t += 4)
      ring.push([r * cos(radians(t)), y, r * sin(radians(t))]);
    LATS.push(ring);
  }
  for (let lon = 0; lon < 360; lon += LON_STEP) {
    const arc = [];
    for (let lat = -90; lat <= 90; lat += 4) {
      const r = cos(radians(lat)), y = sin(radians(lat));
      arc.push([r * cos(radians(lon)), y, r * sin(radians(lon))]);
    }
    LONS.push(arc);
  }
  for (const ang of IRIS_ANGLES) {
    const ring = [];
    for (let phi = 0; phi <= 360; phi += 8)
      ring.push([sin(radians(ang)) * cos(radians(phi)),
                 sin(radians(ang)) * sin(radians(phi)),
                 cos(radians(ang))]);
    IRIS_RINGS.push(ring);
  }
  for (let i = 0; i < SPOKE_COUNT; i++) {
    const phi = radians(i * (360 / SPOKE_COUNT));
    const inner = radians(IRIS_ANGLES[0]), outer = radians(IRIS_ANGLES[2]);
    IRIS_SPOKES.push([
      [sin(inner) * cos(phi), sin(inner) * sin(phi), cos(inner)],
      [sin(outer) * cos(phi), sin(outer) * sin(phi), cos(outer)]
    ]);
  }
}

function rotateY(p, a) {
  const c = cos(a), s = sin(a);
  return [p[0]*c - p[2]*s, p[1], p[0]*s + p[2]*c];
}
function rotateX(p, a) {
  const c = cos(a), s = sin(a);
  return [p[0], p[1]*c - p[2]*s, p[1]*s + p[2]*c];
}
function proj(pt, rx, ry) {
  let p = rotateY(pt, ry);
  p = rotateX(p, rx);
  const sc = FOV / (FOV + p[2]);
  return { x: p[0] * sc, y: -p[1] * sc, z: p[2], sc };
}

// ─── state ─────────────────────────────────
let gazeX = 0, gazeY = 0;
let eyeRadius;
let fragments = [];
let nextFragment = 2000;
let driftPhase = random(100);

const TEXTS = [
  'SUBJECT DETECTED', 'tracking...', 'confidence 0.87',
  'OBSERVE', 'saccade initiated', 'depth: 2.3m',
  'classification uncertain', 'mutual observation',
  'object persistence: 340ms', 'predictive model updating',
  'PERCEPTUAL PROTOCOLS ENGAGED', 'optical flow active',
  'sensory saturation', 'contour detection',
  'NAME', 'REMEMBER', 'REVEAL',
  'bounding box formation', 'feedback loop active',
  'the machine watches', 'lateral inhibition',
  'memory buffer cycling', 'scanning...',
];

class Fragment {
  constructor() {
    this.text = random(TEXTS);
    // position near the eye but offset
    const angle = random(TWO_PI);
    const dist = eyeRadius * random(1.3, 2.5);
    this.x = width / 2 + cos(angle) * dist;
    this.y = height / 2 + sin(angle) * dist;
    this.birth = millis();
    this.life = random(2500, 4500);
    this.fadeIn = 500;
    this.fadeOut = 1000;
    this.drift = random(-0.15, 0.15);
  }

  alpha() {
    const age = millis() - this.birth;
    if (age > this.life) return -1;
    if (age < this.fadeIn) return map(age, 0, this.fadeIn, 0, 1);
    if (age > this.life - this.fadeOut) return map(age, this.life - this.fadeOut, this.life, 1, 0);
    return 1;
  }

  draw() {
    const a = this.alpha();
    if (a < 0) return false;
    this.y += this.drift;
    push();
    fill(255, a * 120);
    noStroke();
    textFont('DRKrapkaRound');
    textSize(max(10, min(13, width * 0.012)));
    textAlign(CENTER);
    text(this.text, this.x, this.y);
    pop();
    return true;
  }
}

// ─── p5 ────────────────────────────────────
function setup() {
  createCanvas(windowWidth, windowHeight);
  buildGeometry();
  eyeRadius = min(width, height) * 0.18;
  textFont('DRKrapkaRound');
}

function draw() {
  background(0);

  // gaze tracking — smooth follow toward mouse
  let tx, ty;
  if (mouseX === 0 && mouseY === 0) {
    // no mouse yet — autonomous scanning
    tx = sin(millis() * 0.0004 + driftPhase) * 0.35;
    ty = sin(millis() * 0.00025 + driftPhase * 1.3) * 0.12;
  } else {
    tx = map(mouseX, 0, width, 0.7, -0.7);
    ty = map(mouseY, 0, height, -0.35, 0.35);
  }
  gazeX = lerp(gazeX, tx, 0.035);
  gazeY = lerp(gazeY, ty, 0.035);

  const cx = width / 2, cy = height / 2;
  const rx = gazeY * 0.85;
  const ry = gazeX * 1.2;

  // ambient glow
  push();
  noStroke();
  const fp = proj([0, 0, 1], rx, ry);
  const glowX = cx + fp.x * eyeRadius * 2;
  const glowY = cy + fp.y * eyeRadius * 2;
  for (let r = eyeRadius * 3; r > 0; r -= eyeRadius * 0.15) {
    fill(255, map(r, 0, eyeRadius * 3, 3, 0));
    ellipse(glowX, glowY, r * 2);
  }
  pop();

  // silhouette circle
  push();
  noFill(); stroke(160, 20); strokeWeight(1.5);
  ellipse(cx, cy, eyeRadius * 2.02);
  pop();

  // latitudes
  for (const ring of LATS) {
    const z0 = rotateX(rotateY(ring[floor(ring.length / 2)], ry), rx)[2];
    const a = z0 > 0 ? 8 + z0 * 30 : 4;
    push(); noFill(); stroke(180, a); strokeWeight(0.6);
    beginShape();
    for (const pt of ring) {
      const p = proj(pt, rx, ry);
      vertex(cx + p.x * eyeRadius, cy + p.y * eyeRadius);
    }
    endShape();
    pop();
  }

  // longitudes
  for (const arc of LONS) {
    const z0 = rotateX(rotateY(arc[floor(arc.length / 2)], ry), rx)[2];
    const a = z0 > 0 ? 6 + z0 * 25 : 4;
    push(); noFill(); stroke(180, a); strokeWeight(0.5);
    beginShape();
    for (const pt of arc) {
      const p = proj(pt, rx, ry);
      vertex(cx + p.x * eyeRadius, cy + p.y * eyeRadius);
    }
    endShape();
    pop();
  }

  // iris rings
  const frontZ = rotateX(rotateY([0, 0, 1], ry), rx)[2];
  const vis = constrain(frontZ * 1.5, 0, 1);

  for (let i = 0; i < IRIS_RINGS.length; i++) {
    const ring = IRIS_RINGS[i];
    const ia = [130, 80, 50][i] * vis;
    push(); noFill(); stroke(255, ia); strokeWeight(i === 0 ? 2 : 1);
    beginShape();
    for (const pt of ring) {
      const p = proj(pt, rx, ry);
      vertex(cx + p.x * eyeRadius, cy + p.y * eyeRadius);
    }
    endShape(CLOSE);
    pop();
  }

  // iris spokes
  for (const spoke of IRIS_SPOKES) {
    const p0 = proj(spoke[0], rx, ry);
    const p1 = proj(spoke[1], rx, ry);
    push(); stroke(255, 30 * vis); strokeWeight(0.5);
    line(cx + p0.x * eyeRadius, cy + p0.y * eyeRadius,
         cx + p1.x * eyeRadius, cy + p1.y * eyeRadius);
    pop();
  }

  // pupil
  if (frontZ > -0.2) {
    const pp = proj([0, 0, 1], rx, ry);
    const px = cx + pp.x * eyeRadius;
    const py = cy + pp.y * eyeRadius;
    const pr = eyeRadius * sin(radians(PUPIL_ANGLE)) * pp.sc;
    const pVis = constrain(frontZ * 2, 0, 1);

    // pupil glow
    push(); noStroke();
    for (let r = pr * 4; r > pr; r -= pr * 0.2) {
      fill(255, map(r, pr, pr * 4, 8, 0) * pVis);
      ellipse(px, py, r * 2);
    }
    pop();

    // pupil void
    push(); noStroke(); fill(0, 230 * pVis);
    ellipse(px, py, pr * 2);
    pop();

    // pupil ring
    push(); noFill(); stroke(255, 90 * pVis); strokeWeight(1.2);
    ellipse(px, py, pr * 2.6);
    pop();
  }

  // text fragments
  if (millis() > nextFragment) {
    if (fragments.length < 4) fragments.push(new Fragment());
    nextFragment = millis() + random(3000, 6000);
  }
  fragments = fragments.filter(f => f.draw());

  // credit
  push();
  fill(255, 25); noStroke();
  textFont('DRKrapkaRound');
  textSize(max(9, min(10, width * 0.009)));
  textAlign(RIGHT);
  text('kindl.work', width - 20, height - 16);
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  eyeRadius = min(width, height) * 0.18;
}
</script>
