<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>OKO</title>
<style>
@font-face {
  font-family: 'DRKrapkaRound';
  src: url('DRKrapkaRound-FontSize10px.woff2') format('woff2');
  font-style: normal;
  font-weight: 400;
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000 }
canvas { display: block }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>
<script>
// OKO EYE — Antonín Kindl, 2025

const LATS=[], LONS=[], IRIS_RINGS=[], IRIS_SPOKES=[];

function initGeometry() {
  for (let lat=-75; lat<=75; lat+=15) {
    const ring=[];
    const r=cos(radians(lat)), y=sin(radians(lat));
    for (let t=0; t<=360; t+=4)
      ring.push([r*cos(radians(t)), y, r*sin(radians(t))]);
    LATS.push(ring);
  }
  for (let lon=0; lon<360; lon+=20) {
    const arc=[];
    for (let lat=-90; lat<=90; lat+=4) {
      const r=cos(radians(lat)), y=sin(radians(lat));
      arc.push([r*cos(radians(lon)), y, r*sin(radians(lon))]);
    }
    LONS.push(arc);
  }
  const irisAngles=[8,16,24];
  for (const ang of irisAngles) {
    const ring=[];
    for (let phi=0; phi<=360; phi+=8)
      ring.push([sin(radians(ang))*cos(radians(phi)),
                 sin(radians(ang))*sin(radians(phi)),
                 cos(radians(ang))]);
    IRIS_RINGS.push(ring);
  }
  for (let i=0; i<14; i++) {
    const phi=radians(i*(360/14));
    const inn=radians(8), out=radians(24);
    IRIS_SPOKES.push([
      [sin(inn)*cos(phi), sin(inn)*sin(phi), cos(inn)],
      [sin(out)*cos(phi), sin(out)*sin(phi), cos(out)]
    ]);
  }
}

function rY(p,a){const c=cos(a),s=sin(a);return[p[0]*c-p[2]*s,p[1],p[0]*s+p[2]*c]}
function rX(p,a){const c=cos(a),s=sin(a);return[p[0],p[1]*c-p[2]*s,p[1]*s+p[2]*c]}
function pj(pt,rx,ry){
  let p=rY(pt,ry); p=rX(p,rx);
  const sc=3.5/(3.5+p[2]);
  return {x:p[0]*sc, y:-p[1]*sc, z:p[2], sc:sc};
}

let gx=0, gy=0, eyeR, dp, frags=[], nextFrag;

const TEXTS=[
  'SUBJECT DETECTED','tracking...','confidence 0.87',
  'OBSERVE','saccade initiated','depth: 2.3m',
  'classification uncertain','mutual observation',
  'object persistence: 340ms','predictive model updating',
  'PERCEPTUAL PROTOCOLS ENGAGED','optical flow active',
  'sensory saturation','contour detection',
  'NAME','REMEMBER','REVEAL',
  'bounding box formation','feedback loop active',
  'the machine watches','lateral inhibition',
  'memory buffer cycling','scanning...',
];

class Frag {
  constructor(){
    this.text=random(TEXTS);
    const a=random(TWO_PI), d=eyeR*random(1.4,2.8);
    this.x=width/2+cos(a)*d;
    this.y=height/2+sin(a)*d;
    this.born=millis();
    this.life=random(2500,4500);
    this.vy=random(-0.12,0.12);
  }
  draw(){
    const age=millis()-this.born;
    if(age>this.life)return false;
    let a;
    if(age<500)a=map(age,0,500,0,1);
    else if(age>this.life-1000)a=map(age,this.life-1000,this.life,1,0);
    else a=1;
    this.y+=this.vy;
    push();
    fill(255,a*140);
    noStroke();
    textSize(max(11,min(14,width*0.013)));
    textAlign(CENTER);
    text(this.text,this.x,this.y);
    pop();
    return true;
  }
}

function setup(){
  pixelDensity(min(window.devicePixelRatio||1,2));
  createCanvas(windowWidth,windowHeight);
  initGeometry();
  eyeR=min(width,height)*0.2;
  dp=random(100);
  nextFrag=millis()+2000;
  textFont('DRKrapkaRound');
}

function draw(){
  background(0);

  let tx,ty;
  if(mouseX===0&&mouseY===0){
    tx=sin(millis()*0.0004+dp)*0.35;
    ty=sin(millis()*0.00025+dp*1.3)*0.12;
  } else {
    tx=map(mouseX,0,width,0.7,-0.7);
    ty=map(mouseY,0,height,-0.35,0.35);
  }
  gx=lerp(gx,tx,0.035);
  gy=lerp(gy,ty,0.035);

  const cx=width/2, cy=height/2;
  const rx=gy*0.85, ry=gx*1.2;

  // glow
  push();noStroke();
  const fp=pj([0,0,1],rx,ry);
  const glX=cx+fp.x*eyeR*1.5, glY=cy+fp.y*eyeR*1.5;
  for(let r=eyeR*2.5;r>0;r-=eyeR*0.12){
    fill(255,map(r,0,eyeR*2.5,5,0));
    ellipse(glX,glY,r*2);
  }
  pop();

  // outline
  push();noFill();stroke(255,40);strokeWeight(1.5);
  ellipse(cx,cy,eyeR*2.02);
  pop();

  // latitudes
  for(const ring of LATS){
    const z0=rX(rY(ring[floor(ring.length/2)],ry),rx)[2];
    const a=z0>0? 18+z0*60 : 7;
    push();noFill();stroke(220,a);strokeWeight(0.7);
    beginShape();
    for(const pt of ring){const p=pj(pt,rx,ry);vertex(cx+p.x*eyeR,cy+p.y*eyeR)}
    endShape();
    pop();
  }

  // longitudes
  for(const arc of LONS){
    const z0=rX(rY(arc[floor(arc.length/2)],ry),rx)[2];
    const a=z0>0? 15+z0*50 : 6;
    push();noFill();stroke(220,a);strokeWeight(0.6);
    beginShape();
    for(const pt of arc){const p=pj(pt,rx,ry);vertex(cx+p.x*eyeR,cy+p.y*eyeR)}
    endShape();
    pop();
  }

  // iris
  const fz=rX(rY([0,0,1],ry),rx)[2];
  const vis=constrain(fz*1.5,0,1);
  const iAlphas=[200,120,80];
  for(let i=0;i<IRIS_RINGS.length;i++){
    push();noFill();stroke(255,iAlphas[i]*vis);strokeWeight(i===0?2:1);
    beginShape();
    for(const pt of IRIS_RINGS[i]){const p=pj(pt,rx,ry);vertex(cx+p.x*eyeR,cy+p.y*eyeR)}
    endShape(CLOSE);
    pop();
  }

  // spokes
  for(const sp of IRIS_SPOKES){
    const p0=pj(sp[0],rx,ry), p1=pj(sp[1],rx,ry);
    push();stroke(255,50*vis);strokeWeight(0.5);
    line(cx+p0.x*eyeR,cy+p0.y*eyeR,cx+p1.x*eyeR,cy+p1.y*eyeR);
    pop();
  }

  // pupil
  if(fz>-0.2){
    const pp=pj([0,0,1],rx,ry);
    const px=cx+pp.x*eyeR, py=cy+pp.y*eyeR;
    const pr=eyeR*sin(radians(6))*pp.sc;
    const pv=constrain(fz*2,0,1);

    push();noStroke();
    for(let r=pr*5;r>pr;r-=pr*0.25){
      fill(255,map(r,pr,pr*5,14,0)*pv);
      ellipse(px,py,r*2);
    }
    pop();

    push();noStroke();fill(0,240*pv);
    ellipse(px,py,pr*2);pop();

    push();noFill();stroke(255,130*pv);strokeWeight(1.5);
    ellipse(px,py,pr*2.6);pop();
  }

  // fragments
  if(millis()>nextFrag){
    if(frags.length<4)frags.push(new Frag());
    nextFrag=millis()+random(3000,6000);
  }
  frags=frags.filter(f=>f.draw());

  // credit
  push();fill(255,30);noStroke();
  textSize(max(9,min(11,width*0.01)));
  textAlign(RIGHT);
  text('kindl.work',width-20,height-16);
  pop();
}

function windowResized(){
  resizeCanvas(windowWidth,windowHeight);
  eyeR=min(width,height)*0.2;
}
</script>
</body>
</html>
